<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | OTOMANET</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body { background-color: #020617; color: #f8fafc; font-family: 'Inter', sans-serif; height: 100vh; display: flex; align-items: center; justify-content: center; margin: 0; }
        .login-card { background-color: #0f172a; border: 1px solid #1e293b; border-radius: 16px; padding: 40px; width: 100%; max-width: 400px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        .logo-area { text-align: center; margin-bottom: 32px; }
        .logo-icon { font-size: 48px; color: #38bdf8; }
        .brand-name { font-size: 24px; font-weight: 800; margin-top: 8px; letter-spacing: -0.02em; }
        .tagline { color: #94a3b8; font-size: 14px; }
        .form-label { font-size: 13px; font-weight: 600; color: #cbd5e1; }
        .form-control { background-color: #020617; border: 1px solid #334155; color: #fff; padding: 12px; border-radius: 10px; }
        .form-control:focus { background-color: #020617; color: #fff; border-color: #38bdf8; box-shadow: 0 0 0 4px rgba(56, 189, 248, 0.1); }
        .btn-login { background-color: #38bdf8; color: #fff; border: none; padding: 12px; border-radius: 10px; font-weight: 700; width: 100%; margin-top: 24px; transition: all 0.2s; }
        .btn-login:hover { background-color: #0ea5e9; transform: translateY(-1px); }
        .alert { border-radius: 10px; font-size: 14px; border: none; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo-area">
            <i class="bi bi-cpu-fill logo-icon"></i>
            <div class="brand-name">OTOMANET</div>
            <div class="tagline">Network Automation Platform</div>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            {% for category, message in messages %}
              <div class="alert alert-{{ category }} mb-4">{{ message }}</div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form method="POST">
            <div class="mb-3">
                <label class="form-label">Username</label>
                <div class="input-group">
                    <span class="input-group-text bg-transparent border-end-0 text-secondary"><i class="bi bi-person"></i></span>
                    <input type="text" name="username" class="form-control border-start-0" placeholder="Enter your username" required autofocus>
                </div>
            </div>
            <div class="mb-4">
                <label class="form-label">Password</label>
                <div class="input-group">
                    <span class="input-group-text bg-transparent border-end-0 text-secondary"><i class="bi bi-lock"></i></span>
                    <input type="password" name="password" id="password" class="form-control border-start-0" placeholder="Enter your password" required>
                    <button class="btn btn-outline-secondary border-start-0" type="button" onclick="togglePassword()"><i class="bi bi-eye" id="toggleIcon"></i></button>
                </div>
            </div>
            <div class="mb-4 form-check">
                <input type="checkbox" name="remember" class="form-check-input" id="remember">
                <label class="form-check-label small text-secondary" for="remember">Remember me</label>
            </div>
            <button type="submit" class="btn btn-login">Login to Dashboard</button>
        </form>
    </div>

    <script>
        function togglePassword() {
            const pwd = document.getElementById('password');
            const icon = document.getElementById('toggleIcon');
            if (pwd.type === 'password') {
                pwd.type = 'text';
                icon.className = 'bi bi-eye-slash';
            } else {
                pwd.type = 'password';
                icon.className = 'bi bi-eye';
            }
        }
    </script>
</body>
</html>
